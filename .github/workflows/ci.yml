name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Validate release tag
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          project_version="$(python -c 'import tomllib; from pathlib import Path; print(tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"])')"
          tag_version="${RELEASE_TAG#v}"
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must use vMAJOR.MINOR.PATCH; got $RELEASE_TAG" >&2
            exit 1
          fi
          if [[ "$tag_version" != "$project_version" ]]; then
            echo "Release tag $RELEASE_TAG does not match pyproject.toml version $project_version" >&2
            exit 1
          fi
      - name: Sync
        run: uv sync --locked
      - name: Lock check
        run: uv lock --check
      - name: Package asset parity
        run: uv run python scripts/sync-package-assets.py --check
      - name: Shellcheck
        run: shellcheck scripts/*.sh
      - name: Dead-code scan
        run: uv run vulture src scripts tests --min-confidence 70
      - name: Lint
        run: uv run ruff check .
      - name: Format check
        run: uv run ruff format --check .
      - name: Type check
        run: uv run basedpyright src tests scripts
      - name: Test
        run: uv run pytest -q
      - name: Build
        run: uv build
      - name: Wheel smoke test
        run: |
          set -euo pipefail
          python -m venv /tmp/rdw-wheel-smoke
          /tmp/rdw-wheel-smoke/bin/pip install dist/*.whl
          ASSET_ROOT=$(/tmp/rdw-wheel-smoke/bin/python -c 'from importlib.resources import files; print(files("rdw.assets"))')
          WHEEL_ROOT=/tmp/rdw-wheel-root
          /tmp/rdw-wheel-smoke/bin/rdw doctor --json
          /tmp/rdw-wheel-smoke/bin/rdw validate-packet "$ASSET_ROOT/knowledge/basketball/demo-guard-2026-demo.yaml" --strict --root "$WHEEL_ROOT" --json
          /tmp/rdw-wheel-smoke/bin/rdw validate-batch "$ASSET_ROOT/examples/batch-tasks.yaml" --root "$WHEEL_ROOT" --json
          /tmp/rdw-wheel-smoke/bin/rdw task plan --request "explain idempotency keys" --out /tmp/rdw-wheel-task --root "$WHEEL_ROOT" --json
          /tmp/rdw-wheel-smoke/bin/rdw batch plan "$ASSET_ROOT/examples/batch-tasks.yaml" --out /tmp/rdw-wheel-batch --root "$WHEEL_ROOT" --json
          /tmp/rdw-wheel-smoke/bin/rdw batch status /tmp/rdw-wheel-batch --json
          /tmp/rdw-wheel-smoke/bin/rdw schema task-contract -o /tmp/rdw-wheel-task-contract.schema.json
          /tmp/rdw-wheel-smoke/bin/rdw task mark research-done /tmp/rdw-wheel-task --json
          /tmp/rdw-wheel-smoke/bin/rdw task mark draft-done /tmp/rdw-wheel-task --json
          /tmp/rdw-wheel-smoke/bin/rdw task mark qa-passed /tmp/rdw-wheel-task --json
          /tmp/rdw-wheel-smoke/bin/rdw task mark final-done /tmp/rdw-wheel-task --json
          /tmp/rdw-wheel-smoke/bin/rdw install --target all --home /tmp/rdw-wheel-home
      - name: Upload release distributions
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: rdw-release-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish tagged release to PyPI
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: quality
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/research-domain-writing
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download release distributions
        uses: actions/download-artifact@v4
        with:
          name: rdw-release-distributions
          path: dist/
      - name: Verify release distributions
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          test -f "dist/research_domain_writing-${version}.tar.gz"
          test -f "dist/research_domain_writing-${version}-py3-none-any.whl"
          ls -l dist/
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
